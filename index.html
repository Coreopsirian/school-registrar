<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COJ Registrar Portal</title>
    <link rel="icon" type="image/x-icon" href="./images/coj-logo-120x124.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to top, #f87171, #a78bfa);
            font-family: sans-serif;
        }

        .card {
            display: flex;
            width: 70%;
            min-height: 580px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        /* LEFT */
        .left {
            width: 41.66%;
            background-image: url('./images/loginform.png');
            background-size: auto;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px 40px;
        }

        .left h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: white;
            line-height: 1.2;
            margin-bottom: 4px;
        }

        .left h1.accent {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: #ff6f7f;
            margin-bottom: 20px;
        }

        .left p {
            font-family: 'Roboto', sans-serif;
            font-size: 0.83rem;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
        }

        /* RIGHT */
        .right {
            width: 58.34%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 50px;
        }

        .right .logo {
            display: block;
            width: 65px;
            margin: 0 auto 10px;
        }

        .right h2 {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            color: #1f2937;
            margin-bottom: 2px;
        }

        .right .subtitle {
            font-family: 'Playfair Display', serif;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 700;
            color: #ef4444;
            letter-spacing: 0.08em;
            margin-bottom: 20px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }

        .field label {
            font-family: system-ui, sans-serif;
            font-size: 0.82rem;
            color: #374151;
            font-weight: 500;
        }

        .input-wrap {
            display: flex;
            align-items: center;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            overflow: hidden;
            background: white;
        }

        .input-wrap span {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            min-height: 38px;
            background: transparent;
            color: #ef4444;
            font-size: 0.9rem;
            flex-shrink: 0;
            line-height: 1;
        }

        .input-wrap span i {
            display: inline-block;
            width: auto;
            height: auto;
            line-height: 1;
        }

        .input-wrap input {
            font-family: system-ui, sans-serif;
            flex: 1;
            padding: 9px 12px 9px 0;
            font-size: 0.85rem;
            border: none;
            outline: none;
            background: transparent;
            color: #374151;
        }

        .input-wrap input::placeholder {
            color: #9ca3af;
        }

        .forgot {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            font-size: 0.78rem;
            color: #374151;
            margin-bottom: 12px;
            text-decoration: none;
            display: block;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .btn-login {
            font-family: system-ui, sans-serif;
            width: 100%;
            padding: 11px;
            background: #ef4444;
            color: white;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-login:hover {
            background: #dc2626;
        }

        .signup-link {
            font-family: 'Roboto', sans-serif;
            text-align: center;
            font-size: 0.78rem;
            color: #6b7280;
            margin-top: 12px;
        }

        .signup-link a {
            color: #ef4444;
            font-weight: 700;
            text-decoration: none;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- LEFT -->
        <div class="left">
            <h1>Manage your<br>school with</h1>
            <h1 class="accent">ease</h1>
            <p>Access your student's enrollment<br>records and student data in an<br>organized and secured way.</p>
        </div>

        <!-- RIGHT -->
        <div class="right">
            <img src="./images/coj-logo-120x124.png" class="logo" alt="COJ Logo">
            <h2>Welcome back, Teacher!</h2>
            <p class="subtitle">REGISTRAR PORTAL</p>

            <form>
                <div class="field">
                    <label>Email Address</label>
                    <div class="input-wrap">
                        <span><i class="bi bi-envelope"></i></span>
                        <input type="email" placeholder="admin@gmail.com">
                    </div>
                </div>

                <div class="field">
                    <label>Password</label>
                    <div class="input-wrap">
                        <span><i class="bi bi-lock-fill"></i></span>
                        <input type="password" placeholder="Enter your password">
                    </div>
                </div>

                <a href="#" class="forgot">Forgot password?</a>

                <button type="submit" class="btn-login">Log In</button>

                <p class="signup-link">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </p>
            </form>
        </div>

    </div>

</body>
</html>
